services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - JWT_SECRET=devcollab-super-secret-key-2024
      - MONGO_URI=mongodb://mongo:27017/devcollab

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo-data:
